<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#161b22" />
    <meta name="description" content="Orchestrator — autonomous SWE-agent pipeline operator interface" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orchestr8r" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <title>Orchestrator</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --blue: #58a6ff;
        --green: #3fb950;
        --amber: #d29922;
        --red: #f85149;
        --radius: 8px;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      :focus-visible {
        outline: 3px solid #58a6ff;
        outline-offset: 2px;
        border-radius: 2px;
      }
      :focus:not(:focus-visible) { outline: none; }
      .skip-link {
        position: absolute;
        left: -9999px;
        top: 8px;
        z-index: 9999;
        background: #58a6ff;
        color: #000;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        text-decoration: none;
      }
      .skip-link:focus { left: 8px; }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root" role="application" aria-label="Orchestrator"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
