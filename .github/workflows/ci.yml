name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest

      - name: mypy
        run: mypy --strict src/

      - name: ruff
        run: ruff check src/ tests/

  ui-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI (TypeScript check + Vite)
        run: npm run build
        working-directory: ui
