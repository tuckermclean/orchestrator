# ---------------------------------------------------------------------------
# Secret reference template
# ---------------------------------------------------------------------------
# This template is intentionally a no-op: secrets are created by the operator
# out-of-band (kubectl create secret) and referenced by name via
# .Values.secretName.  This file serves as documentation of expected keys.
#
# To create the secret (ARCHITECTURE §6):
#
#   kubectl create secret generic orchestrator-secrets \
#     --namespace orchestrator \
#     --from-literal=FORGE_TOKEN=<pat_or_empty_if_app_mode> \
#     --from-literal=GITHUB_APP_ID=<app_id> \
#     --from-literal=GITHUB_APP_PRIVATE_KEY="$(cat private-key.pem)" \
#     --from-literal=GITHUB_APP_INSTALLATION_ID=<installation_id> \
#     --from-literal=OPERATOR_SECRET_KEY=<webhook_hmac_secret> \
#     --from-literal=CLAUDE_CODE_OAUTH_TOKEN=<oauth_token> \
#     --from-literal=PUSH_VAPID_PRIVATE_KEY=<vapid_private_key>
#
# ExternalSecret / SealedSecret: replace this file with your own ESO/Bitnami
# sealed-secret template that emits a Secret named {{ .Values.secretName }}.
# ---------------------------------------------------------------------------
