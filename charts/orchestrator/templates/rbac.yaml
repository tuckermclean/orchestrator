{{- if .Values.rbac.create -}}
# Role: allows the orchestrator service account to create/manage K8s Jobs
# in its own namespace for the agent-runner harness backend (issue #51).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "orchestrator.fullname" . }}-job-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "deletecollection"]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "orchestrator.fullname" . }}-job-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "orchestrator.fullname" . }}-job-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "orchestrator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
